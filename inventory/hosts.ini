# ══════════════════════════════════════════════════════════
# WHY THIS FILE?
# Ansible needs to know WHICH machines to configure.
# An "inventory" is just a list of hosts, grouped.
#
# [bastion] — a small EC2 instance (created separately, or via
# a future terraform addition) used as a secure jump box to
# reach RDS/EKS resources that live in private subnets.
#
# [local] — your own machine, "localhost". Used for the
# secrets-generation playbook, which doesn't SSH anywhere —
# it just runs `terraform output` and writes files locally.
# ══════════════════════════════════════════════════════════

[bastion]
# Replace with your bastion EC2's public IP after creating it
# bastion-1 ansible_host=3.123.45.67 ansible_user=ec2-user

[local]
localhost ansible_connection=local
