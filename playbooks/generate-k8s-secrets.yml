# ══════════════════════════════════════════════════════════
# WHY THIS PLAYBOOK?
#
# After `terraform apply`, AWS gives you real endpoints:
#   - 6 RDS hostnames
#   - MSK bootstrap broker addresses
#   - ElastiCache Redis endpoint
#
# Rather than manually copy-pasting these into Kubernetes
# YAML files (error-prone), this playbook:
#   1. Runs `terraform output -json` to read those values
#   2. Feeds them into templates/k8s-secret.yml.j2
#   3. Writes a ready-to-apply Kubernetes Secret manifest
#
# This is the "glue" between Terraform (infrastructure) and
# Kubernetes/Helm (application deployment) — a common
# real-world pattern for config management.
#
# HOW TO USE:
#   1. terraform apply must have been run first (so outputs
#      have real values, not "known after apply")
#   2. ansible-playbook -i inventory/hosts.ini playbooks/generate-k8s-secrets.yml
#   3. Output written to: ../kubernetes/base/secrets.generated.yaml
#   4. kubectl apply -f ../kubernetes/base/secrets.generated.yaml
# ══════════════════════════════════════════════════════════

- name: Generate Kubernetes secrets from Terraform outputs
  hosts: local
  gather_facts: false

  vars:
    terraform_dir: "{{ playbook_dir }}/../../terraform/environments/dev"
    output_path: "{{ playbook_dir }}/../../kubernetes/base/secrets.generated.yaml"
    # Must match terraform.tfvars db_password — pass at runtime with:
    #   ansible-playbook ... -e "db_password=YourPassword"
    db_password: "CHANGE_ME"

  tasks:
    - name: Read Terraform outputs as JSON
      command: terraform output -json
      args:
        chdir: "{{ terraform_dir }}"
      register: tf_output_raw
      changed_when: false

    - name: Parse Terraform outputs
      set_fact:
        tf_outputs: "{{ tf_output_raw.stdout | from_json }}"

    - name: Extract values needed for the secret template
      set_fact:
        db_endpoints: "{{ tf_outputs.database_endpoints.value }}"
        kafka_bootstrap_brokers: "{{ tf_outputs.kafka_bootstrap_brokers.value }}"
        redis_endpoint: "{{ tf_outputs.redis_endpoint.value }}"

    - name: Ensure output directory exists
      file:
        path: "{{ output_path | dirname }}"
        state: directory

    - name: Render Kubernetes Secret manifest
      template:
        src: "{{ playbook_dir }}/../templates/k8s-secret.yml.j2"
        dest: "{{ output_path }}"

    - name: Done
      debug:
        msg: "Secret manifest written to {{ output_path }} — apply with: kubectl apply -f {{ output_path }}"
