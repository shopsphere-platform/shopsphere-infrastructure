# ══════════════════════════════════════════════════════════
# api-gateway — :8080
#
# THIS is the service that gets a LoadBalancer (public IP).
# Remember the routing fix we did:
#   uri: http://product-service:8082  (Docker service name)
#
# In Kubernetes, "product-service" STILL resolves correctly —
# same hostname pattern, because the Service for
# product-service is also named "product-service". No
# application.yml changes needed for the routes themselves!
#
# What DOES change: JWT secret and Eureka URL move from
# application.yml into env vars sourced from the
# "shopsphere-connections" Secret (generated by Ansible).
# ══════════════════════════════════════════════════════════
nameOverride: api-gateway

image:
  repository: ghcr.io/shopsphere-platform/api-gateway
  tag: latest

containerPort: 8080

# LoadBalancer = AWS creates a real internet-facing ELB.
# `kubectl get svc -n shopsphere api-gateway` will show an
# EXTERNAL-IP — that's your new public API endpoint, replacing
# http://localhost:8080 in the React frontend's api.js
service:
  type: LoadBalancer
  port: 80

env:
  SPRING_PROFILES_ACTIVE: "k8s"

envFromSecretRefs:
  - shopsphere-connections   # provides EUREKA_*, JWT_SECRET, etc.

resources:
  requests:
    cpu: "200m"
    memory: "384Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
